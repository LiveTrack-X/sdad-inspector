version: 2
updated: 2026-07-15

# standard | full
scale: full
# unit | packet; this boundary does not replace owner gates.
execution_scope: packet

active_spec: SPEC/SPEC-COMPLETE.md
active_packet:
  id: SI-013-alpha-release
  objective: Publish the owner-authorized unsigned SDAD Inspector 0.0.1 alpha GitHub prerelease as CPython 3.12-based single-file portable executables for Windows, macOS, and Linux, each packaged alone with SHA-256 checksums and smoke-tested after download on a separate clean hosted runner, alongside a complete public README, a minimal intentional source tree, and repaired cross-platform path handling, without claiming signing, installer, updater, stable support, package-registry publication, deployment, or automatic project writes.
  # Current dominant checkpoint only; evidence and acceptance history live elsewhere.
  status: release_candidate

# Must equal active_packet.id after the validation contract is reviewed.
validation_for: SI-013-alpha-release

# Optional. Uncomment only when a current resume checkpoint actually exists.
# current_handoff: docs/sdad/handoffs/YYYY-MM-DD-HNNNN-topic.md

# Keep only gates that can stop the current packet.
owner_gates:
  - release
  - publishing

# Keep commands short and runnable from the repository root.
validation:
  - command: python scripts/validate_public_repository.py
    proves: Candidate public files exclude personal absolute paths, sensitive filenames, high-confidence credential markers, generated directories, and files above the bounded public-source size limit.
  - command: python -m unittest discover -s tests -v
    proves: Core, public-repository preflight, coherent live workspace, effective Git line-ending semantics, server security, report, package-boundary, and inspected-repository no-write regressions pass locally.
  - command: npm --prefix web run typecheck
    proves: The source-publication cleanup leaves the shared browser/native frontend type-safe.
  - command: npm --prefix web test -- --run
    proves: Existing shared frontend interactions remain covered before publication.
  - command: npm --prefix web run build
    proves: The public source tree produces the localized static frontend bundle.
  - command: python scripts/validate_browser_contract.py
    proves: Browser security, read-only inspection routes, bounded preferences, and Rule 5 proposal-export boundaries remain coherent.
  - command: python scripts/validate_native_contract.py
    proves: Native resources, authenticated engine staging, lifecycle shutdown, and the checked-in platform workflows remain structurally coherent.
  - command: python scripts/validate_release.py
    proves: The alpha version, tag contract, README limitations, release notes, single-file archive contract, CPython 3.12 build pin, separate portable-smoke jobs, prerelease flag, and three-platform release matrix agree before tagging.
  - command: python .runtime/sdad-v3.2.2/scripts/sdad.py doctor . --json --strict --require-version 3.2.2
    proves: The SI-013 packet, SPEC, TODO, findings, routes, validation, and release boundary form one strict SDAD 3.2.2 control-plane checkpoint.

# Eligible current-packet selections; intent chooses which targeted content to read.
