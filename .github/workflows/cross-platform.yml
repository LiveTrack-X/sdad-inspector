name: Cross-platform preview checks

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  preview:
    name: ${{ matrix.platform }} unsigned preview
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos
          - os: ubuntu-latest
            platform: linux
    steps:
      - name: Check out Inspector
        uses: actions/checkout@v4
      - name: Check out released SDAD v3.2.2
        uses: actions/checkout@v4
        with:
          repository: LiveTrack-X/spec-driven-ai-development
          ref: v3.2.2
          path: .ci/sdad-v3.2.2
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Validate public repository boundary
        run: |
          python scripts/validate_public_repository.py
          python scripts/validate_release.py
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install Linux display dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y xvfb libegl1 libgl1 libxcb-cursor0 libxcb-keysyms1 libxcb-xinerama0 libxkbcommon-x11-0
      - name: Install Python dependencies
        if: runner.os != 'Linux'
        run: python -m pip install -e ".[desktop,build]"
      - name: Install Python and Qt dependencies
        if: runner.os == 'Linux'
        run: |
          python -m pip install -e ".[build]"
          python -m pip install "pywebview[qt]>=5.4,<7"
      - name: Install frontend dependencies
        run: npm --prefix web ci
      - name: Test Python core
        run: python -m unittest discover -s tests -v
      - name: Typecheck frontend
        run: npm --prefix web run typecheck
      - name: Test frontend
        run: npm --prefix web test -- --run
      - name: Build frontend
        run: npm --prefix web run build
      - name: Validate native contract
        run: python scripts/validate_native_contract.py --sdad-checkout .ci/sdad-v3.2.2
      - name: Check native prerequisites
        run: python scripts/build_native.py --check --sdad-checkout .ci/sdad-v3.2.2
      - name: Build unsigned one-file preview
        run: python scripts/build_native.py --skip-frontend --sdad-checkout .ci/sdad-v3.2.2
      - name: Smoke native preview
        if: runner.os != 'Linux'
        run: python scripts/smoke_native.py .
      - name: Smoke native preview under Xvfb
        if: runner.os == 'Linux'
        run: xvfb-run -a python scripts/smoke_native.py .
      - name: Package the single portable executable
        run: python scripts/package_release.py --platform "${{ matrix.platform }}" --arch "${{ runner.arch }}" --version "0.0.1-alpha.1"
      - name: Upload the ephemeral portable archive
        uses: actions/upload-artifact@v4
        with:
          name: sdad-inspector-${{ matrix.platform }}-${{ runner.arch }}
          path: release-artifacts/*
          if-no-files-found: error
          retention-days: 3

  portable-smoke:
    name: ${{ matrix.platform }} downloaded portable smoke
    needs: preview
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos
          - os: ubuntu-latest
            platform: linux
    steps:
      - name: Check out the smoke harness
        uses: actions/checkout@v4
      - name: Set up Python for the smoke harness only
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Linux display dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y xvfb libegl1 libgl1 libxcb-cursor0 libxcb-keysyms1 libxcb-xinerama0 libxkbcommon-x11-0
      - name: Download the archive from the build job
        uses: actions/download-artifact@v4
        with:
          name: sdad-inspector-${{ matrix.platform }}-${{ runner.arch }}
          path: release-candidate
      - name: Inspect, extract, and smoke the single executable
        if: runner.os != 'Linux'
        run: python scripts/smoke_release_archive.py . --artifact-dir release-candidate
      - name: Inspect, extract, and smoke the single executable under Xvfb
        if: runner.os == 'Linux'
        run: xvfb-run -a python scripts/smoke_release_archive.py . --artifact-dir release-candidate
